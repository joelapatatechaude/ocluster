# NNCP for Portworx Storage Network (VLAN 50)
#
# Network setup:
#   - enp0s20f0u1.50: VLAN 50 interface for Portworx storage traffic
#
# Prerequisites:
#   - NMState operator installed
#   - NMState instance created
#   - Switch ports 6-8 configured with VLAN 50 tagged
#
# To apply:
#   oc apply -f nncp-vlan50-storage.yaml
#
# IP assignments:
#   Node                  enp0s20f0u1.50 (VLAN 50)
#   80-3f-5d-f6-90-7b     10.50.0.1/24
#   80-3f-5d-f9-da-40     10.50.0.2/24
#   80-3f-5d-f9-e1-b2     10.50.0.3/24
#
---
apiVersion: nmstate.io/v1
kind: NodeNetworkConfigurationPolicy
metadata:
  name: storage-vlan50-node1
  annotations:
    description: VLAN 50 storage network - Node 1
spec:
  nodeSelector:
    kubernetes.io/hostname: 80-3f-5d-f6-90-7b
  desiredState:
    interfaces:
    - name: enp0s20f0u1.50
      type: vlan
      state: up
      vlan:
        base-iface: enp0s20f0u1
        id: 50
      ipv4:
        enabled: true
        dhcp: false
        address:
        - ip: 10.50.0.1
          prefix-length: 24
---
apiVersion: nmstate.io/v1
kind: NodeNetworkConfigurationPolicy
metadata:
  name: storage-vlan50-node2
  annotations:
    description: VLAN 50 storage network - Node 2
spec:
  nodeSelector:
    kubernetes.io/hostname: 80-3f-5d-f9-da-40
  desiredState:
    interfaces:
    - name: enp0s20f0u1.50
      type: vlan
      state: up
      vlan:
        base-iface: enp0s20f0u1
        id: 50
      ipv4:
        enabled: true
        dhcp: false
        address:
        - ip: 10.50.0.2
          prefix-length: 24
---
apiVersion: nmstate.io/v1
kind: NodeNetworkConfigurationPolicy
metadata:
  name: storage-vlan50-node3
  annotations:
    description: VLAN 50 storage network - Node 3
spec:
  nodeSelector:
    kubernetes.io/hostname: 80-3f-5d-f9-e1-b2
  desiredState:
    interfaces:
    - name: enp0s20f0u1.50
      type: vlan
      state: up
      vlan:
        base-iface: enp0s20f0u1
        id: 50
      ipv4:
        enabled: true
        dhcp: false
        address:
        - ip: 10.50.0.3
          prefix-length: 24
