apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: worker
  name: 97-worker-ceph-bluestore-cleanup
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
      - contents:
          source: data:text/plain;charset=utf-8;base64,
        filesystem: root
        mode: 493
        path: /usr/local/sbin/ceph-bluestore-cleanup
    systemd:
      units:
      - contents: |
          [Unit]
          Description=Cleans Ceph bluestore metadata on a given disk
          Wants=network-online.target
          After=network-online.target
          After=kubelet.service
          ConditionPathExists=/var/lib/kubelet/config.json
          ConditionPathExists=!/var/lib/ceph-bluestore-removed

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          User=root
          ExecStart=/usr/local/sbin/ceph-bluestore-cleanup registry.redhat.io/odf4/rook-ceph-rhel9-operator:v4.18 /var/lib/kubelet/config.json

          TimeoutSec=300

          [Install]
          WantedBy=multi-user.target
        enabled: true
        name: "ceph-bluestore-cleanup.service"
